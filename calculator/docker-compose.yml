
services:
  app1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app1
    expose:
      - "8080"

  app2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app2
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

